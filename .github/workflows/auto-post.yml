name: AI 카드뉴스 자동 업로드

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  post-cardnews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install anthropic feedparser Pillow requests youtube-transcript-api

      - name: 한국어 폰트 설치
        run: sudo apt-get install -y fonts-nanum

      - name: 파이프라인 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_USER_ID:        ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:   ${{ secrets.IG_ACCESS_TOKEN }}
          IMGBB_API_KEY:     ${{ secrets.IMGBB_API_KEY }}
        run: cd src && python pipeline.py

      - name: 결과물 저장
        uses: actions/upload-artifact@v4
        with:
          name: cardnews-${{ github.run_number }}
          path: output/
          retention-days: 7
